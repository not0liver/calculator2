<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remit Calculator</title>
    <style>
        /* Modern system fonts and centered layout */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f6f8;
            display: flex;
            align-items: center; /* Centers vertically */
            justify-content: center; /* Centers horizontally */
            min-height: 100vh;
        }

        /* Floating app card style */
        .app-card {
            width: 90%;
            max-width: 380px;
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            padding: 32px 24px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h2 {
            margin: 0;
            color: #1c1c1c;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 6px 0 0 0;
            color: #888;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #555;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 45px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            background-color: #f9f9f9;
            border: 2px solid transparent;
            border-radius: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        /* Adds the Peso sign inside the input */
        .input-group::before {
            content: "₱";
            position: absolute;
            left: 18px;
            top: 40px;
            font-size: 18px;
            font-weight: 600;
            color: #aaa;
        }

        input:focus {
            background-color: #fff;
            border-color: #d70f64; /* Foodpanda Pink */
            box-shadow: 0 4px 12px rgba(215, 15, 100, 0.1);
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: #d70f64;
            color: white;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 8px 20px rgba(215, 15, 100, 0.25);
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-appearance: none;
        }

        button:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(215, 15, 100, 0.2);
        }

        /* Results section with smooth fade-in */
        .results-card {
            margin-top: 24px;
            padding: 24px;
            background-color: #fff4f7; /* Light pink background */
            border-radius: 16px;
            border: 1px solid #ffe1eb;
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .results-card.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .divider {
            height: 1px;
            background-color: #f0c5d3;
            margin: 16px 0;
        }

        .final-amount {
            text-align: center;
            margin-top: 16px;
        }

        .final-amount span {
            font-size: 13px;
            color: #d70f64;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .final-amount .amount {
            font-size: 42px;
            color: #1c1c1c;
            font-weight: 800;
            margin-top: 4px;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header">
            <h2>Smart Remit</h2>
            <p>Auto-deducts 2% tax & rounds up</p>
        </div>

        <div class="input-group">
            <label for="wallet">Wallet Balance</label>
            <input type="number" id="wallet" placeholder="1766.03" inputmode="decimal">
        </div>

        <div class="input-group">
            <label for="payments">Payments (Sahod)</label>
            <input type="number" id="payments" placeholder="532.82" inputmode="decimal">
        </div>

        <button onclick="calculateRemit()">Calculate Exact Pay</button>

        <div class="results-card" id="results">
            <div class="result-row">
                <span>Net Earnings (After 2%):</span>
                <span id="net-display" style="font-weight: 600; color:#333;">₱0.00</span>
            </div>
            
            <div class="divider"></div>

            <div class="final-amount">
                <span>Pay at 7-Eleven</span>
                <div class="amount" id="final-display">₱0</div>
            </div>
        </div>
    </div>

    <script>
        function calculateRemit() {
            let walletInput = document.getElementById('wallet').value;
            let paymentsInput = document.getElementById('payments').value;

            let rawWallet = parseFloat(walletInput) || 0;
            let rawPayments = parseFloat(paymentsInput) || 0;

            let debt = Math.abs(rawWallet);
            let tax = rawPayments * 0.02;
            let netEarnings = rawPayments - tax;
            let exactRemit = debt - netEarnings;
            let finalRemit = exactRemit > 0 ? Math.ceil(exactRemit) : 0;

            document.getElementById('net-display').innerText = '₱' + netEarnings.toFixed(2);
            document.getElementById('final-display').innerText = '₱' + finalRemit;

            // Trigger the fade-in animation
            let resultsCard = document.getElementById('results');
            resultsCard.style.display = 'block';
            
            // Small delay to allow display:block to apply before changing opacity
            setTimeout(() => {
                resultsCard.classList.add('show');
            }, 10);
        }
    </script>
</body>
</html>
